# ============================================================
# OPSflow Full Stack Docker Compose
# ============================================================
# Usage:
#   docker compose up -d
#
# Services:
#   mysql       - MySQL 8 database
#   redis       - Redis cache & message broker
#   neo4j       - Neo4j graph database (CMDB)
#   backend     - Django ASGI (Daphne) application
#   celery      - Celery worker for async tasks
#   frontend    - Nginx static file serving + reverse proxy
# ============================================================

version: "3.8"

x-defaults: &defaults
  restart: unless-stopped
  networks:
    - opsflow-net

volumes:
  mysql-data:
  redis-data:
  neo4j-data:
  neo4j-logs:

networks:
  opsflow-net:
    driver: bridge

# ============================================================
services:
  # ---- MySQL 8 ----
  mysql:
    <<: *defaults
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-opsflow123}
      MYSQL_DATABASE: opsflow
      MYSQL_USER: opsflow
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-opsflow123}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d
    command:
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --max_connections=500

  # ---- Redis ----
  redis:
    <<: *defaults
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes

  # ---- Neo4j (CMDB) ----
  neo4j:
    <<: *defaults
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-opsflow123}
      NEO4J_dbms_memory_pagecache_size: 512M
      NEO4J_dbms_memory_heap_max__size: 1G
    ports:
      - "7474:7474"   # HTTP browser
      - "7687:7687"   # Bolt protocol
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs

  # ---- Django Backend (ASGI) ----
  backend:
    <<: *defaults
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DJANGO_SETTINGS_MODULE: application.settings
      DATABASE_ENGINE: django.db.backends.mysql
      DATABASE_NAME: opsflow
      DATABASE_HOST: mysql
      DATABASE_PORT: 3306
      DATABASE_USER: opsflow
      DATABASE_PASSWORD: ${MYSQL_PASSWORD:-opsflow123}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_URL: redis://redis:6379/0
      NEO4J_HOST: neo4j
      NEO4J_PORT: 7687
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-opsflow123}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      DEBUG: "False"
    depends_on:
      - mysql
      - redis
      - neo4j
    ports:
      - "8000:8000"
    volumes:
      - static-files:/app/static
      - media-files:/app/media

  # ---- Celery Worker ----
  celery:
    <<: *defaults
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DJANGO_SETTINGS_MODULE: application.settings
      DATABASE_HOST: mysql
      DATABASE_NAME: opsflow
      DATABASE_USER: opsflow
      DATABASE_PASSWORD: ${MYSQL_PASSWORD:-opsflow123}
      REDIS_HOST: redis
      NEO4J_HOST: neo4j
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      DEBUG: "False"
      # Override entrypoint: run Celery worker instead of web server
      SERVICE_MODE: celery
    depends_on:
      - backend
      - redis
    command: celery -A application worker -l info -c 4 --max-tasks-per-child=100

  # ---- Frontend (Nginx) ----
  frontend:
    <<: *defaults
    image: nginx:1.25-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./web/dist:/usr/share/nginx/html:ro
      - static-files:/static:ro
      - media-files:/media:ro
    depends_on:
      - backend

volumes:
  static-files:
  media-files:
