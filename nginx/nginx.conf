# ============================================================
# OPSflow Nginx Configuration
# ============================================================
# Frontend static files served from /usr/share/nginx/html
# Backend API proxied to Django ASGI at backend:8000
# Static/media files mounted as volumes
# ============================================================

upstream backend {
    server backend:8000;
}

# ---- HTTP (production should redirect to HTTPS) ----
server {
    listen 80;
    server_name _;

    # Frontend SPA
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;

        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }

    # Backend API
    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Increase timeout for AI generation endpoints
        proxy_read_timeout 120s;
        proxy_send_timeout 60s;
    }

    # WebSocket (Daphne / Channels)
    location /ws/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400s;
    }

    # Admin site
    location /admin/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Static files (Django collectstatic)
    location /static/ {
        alias /static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Media files (user uploads)
    location /media/ {
        alias /media/;
        expires 7d;
    }

    # Swagger/ReDoc docs
    location /swagger/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
    }
    location /redoc/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
    }

    # Health check
    location /health/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        access_log off;
    }

    # Deny hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 1024;
    gzip_vary on;
}
