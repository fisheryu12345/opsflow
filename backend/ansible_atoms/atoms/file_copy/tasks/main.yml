---
- name: 复制文件到远程主机
  ansible.builtin.copy:
    src: "{{ src }}"
    dest: "{{ dest }}"
    owner: "{{ owner | default(omit) }}"
    mode: "{{ mode | default('0644') }}"
  register: _copy_result

- name: 输出复制结果
  ansible.builtin.set_fact:
    changed: "{{ _copy_result.changed }}"
    dest_path: "{{ _copy_result.dest }}"
