---
- name: 测试 Nginx 配置
  ansible.builtin.shell: nginx -t -c {{ config_path | default('/etc/nginx/nginx.conf') }}
  register: _nginx_test
  changed_when: false
  when: test_config | default(true) | bool

- name: 重载 Nginx
  ansible.builtin.systemd:
    name: nginx
    state: reloaded
  when: _nginx_test.rc is defined and _nginx_test.rc == 0

- name: 输出 Nginx 操作结果
  ansible.builtin.set_fact:
    config_valid: "{{ _nginx_test.rc == 0 if _nginx_test.rc is defined else true }}"
    reload_success: "{{ _nginx_test.rc == 0 if _nginx_test.rc is defined else true }}"
