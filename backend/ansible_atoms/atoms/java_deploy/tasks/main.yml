---
- name: 确保目标目录存在
  ansible.builtin.file:
    path: "{{ target_path | default('/opt/app') }}"
    state: directory
    mode: '0755'

- name: 复制 Java 制品到目标目录
  ansible.builtin.copy:
    src: "{{ artifact_path }}"
    dest: "{{ target_path | default('/opt/app') }}/{{ artifact_path | basename }}"
    mode: '0755'
  register: _deploy_copy

- name: 停止旧服务
  ansible.builtin.systemd:
    name: "{{ service_name }}"
    state: stopped
  when: service_name is defined and service_name | length > 0
  ignore_errors: true

- name: 启动新服务
  ansible.builtin.systemd:
    name: "{{ service_name }}"
    state: started
    daemon_reload: true
  when: service_name is defined and service_name | length > 0

- name: 输出部署结果
  ansible.builtin.set_fact:
    deploy_success: "{{ _deploy_copy is success }}"
    service_status: "{{ 'started' if (service_name | default('')) | length > 0 else 'skipped' }}"
