---
- name: 写入脚本文件到临时路径
  ansible.builtin.tempfile:
    state: file
    suffix: ".{{ script_type | default('sh') }}"
  register: _script_temp
  when: script_content is defined

- name: 写入脚本内容
  ansible.builtin.copy:
    content: "{{ script_content }}"
    dest: "{{ _script_temp.path }}"
    mode: '0755'
  when: _script_temp.path is defined

- name: 执行脚本
  ansible.builtin.shell: "{{ _script_temp.path }} {{ args | default('') }}"
  register: _exec_result
  ignore_errors: true

- name: 清理临时脚本
  ansible.builtin.file:
    path: "{{ _script_temp.path }}"
    state: absent
  when: _script_temp.path is defined

- name: 输出执行结果
  ansible.builtin.set_fact:
    stdout: "{{ _exec_result.stdout | default('') }}"
    stderr: "{{ _exec_result.stderr | default('') }}"
    returncode: "{{ _exec_result.rc | default(-1) }}"
