---
- name: 发送企业微信告警
  ansible.builtin.uri:
    url: "{{ wecom_webhook_url | default('https://qyapi.weixin.qq.com/cgi-bin/webhook/send') }}"
    method: POST
    body_format: json
    body:
      msgtype: markdown
      markdown:
        content: "## {{ title }}\n{{ message }}"
  register: _alert_result
  when: channel | default('wecom') == 'wecom'
  ignore_errors: true

- name: 发送邮件告警
  ansible.builtin.mail:
    to: "{{ recipients }}"
    subject: "{{ title }}"
    body: "{{ message }}"
  when: channel | default('wecom') == 'email'
  ignore_errors: true

- name: 输出告警结果
  ansible.builtin.set_fact:
    sent: "{{ _alert_result is success if channel | default('wecom') == 'wecom' else true }}"
    message_id: "{{ _alert_result.json.msgid | default('') if channel | default('wecom') == 'wecom' else '' }}"
